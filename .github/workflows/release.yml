name: Build and Release (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          git fetch origin main --prune
          $containsMain = git branch -r --contains $env:GITHUB_SHA | ForEach-Object { $_.Trim() } | Where-Object { $_ -eq "origin/main" }
          if (-not $containsMain) {
            throw "Tag commit is not on origin/main. Releases are only allowed from main."
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore XboxControllerStudio.sln

      - name: Publish win-x64 (self-contained)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "github.ref_name is empty."
          }

          $packageVersion = if ($tag.StartsWith('v')) { $tag.Substring(1) } else { $tag }
          $assemblyVersion = ($packageVersion -split '-', 2)[0]

          dotnet publish XboxControllerStudio.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:Version=$packageVersion `
            /p:AssemblyVersion=$assemblyVersion `
            /p:FileVersion=$assemblyVersion `
            /p:InformationalVersion=$tag `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:PublishTrimmed=false `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            -o publish/win-x64

      - name: Validate executable output
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path publish/win-x64 -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            throw "No .exe file was generated in publish/win-x64"
          }

      - name: Zip artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path publish/win-x64/* -DestinationPath dist/XboxControllerStudio-win-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: XboxControllerStudio-win-x64
          path: |
            dist/XboxControllerStudio-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/XboxControllerStudio-win-x64.zip
