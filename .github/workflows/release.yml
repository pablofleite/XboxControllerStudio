name: Build and Release (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore XboxControllerStudio.sln

      - name: Publish win-x64 (self-contained)
        shell: pwsh
        run: |
          dotnet publish XboxControllerStudio.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:PublishTrimmed=false `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            -o publish/win-x64

      - name: Validate executable output
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path publish/win-x64 -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            throw "No .exe file was generated in publish/win-x64"
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Path $exe.FullName -Destination dist/$($exe.Name) -Force

      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path publish/win-x64/* -DestinationPath dist/XboxControllerStudio-win-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: XboxControllerStudio-win-x64
          path: |
            publish/win-x64/**
            dist/*.exe
            dist/XboxControllerStudio-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/XboxControllerStudio-win-x64.zip
